<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sprout Reactive Attributes - Global State</title>
    <style app="sprout-tests">
      [ref]:not([hidden]) {
        display: block;
        height: 1px;
        width: 1px;
      }
    </style>
    <!-- Core bootstraps automatically via script[app] at end of body -->
    <!-- Define global runtime for sprout-tests and initialize global state -->
    <script app="sprout-tests">
      // appName is 'sprout-tests' so we must use bracket notation
      globalThis['sprout-tests_runtime'] = function () {
        this.setGlobalState({
          title: 'Hello',
          isHidden: false,
          isVisible: true,
          status: 'open',
          check: true,
          get titleUpper() { return this.title.toUpperCase(); },
          get isDone() { return this.status === 'done'; }
        });
      };
    </script>
    <!-- Component template (no local state; binds to global values) -->
    <template app="sprout-tests" for="attr-global-host">
      <html>
        <div is="reactive-div" ref="str" :title="title"></div>
        <div is="reactive-div" ref="bool" :hidden="isHidden"></div>
        <div is="reactive-div" ref="neg" :hidden="!isVisible"></div>
        <div is="reactive-div" ref="eq" :hidden="is_status:done"></div>
        <div is="reactive-div" ref="tern" :data-mode="check?on:off"></div>
        <div is="reactive-div" ref="ternOnly" :data-flag="check?on"></div>
        <div is="reactive-div" ref="getStr" :title="titleUpper"></div>
        <div is="reactive-div" ref="getBool" :hidden="isDone"></div>
      </html>
    </template>
  </head>
  <body>
    <attr-global-host></attr-global-host>
    <script src="../../dist/sprout-core.js" app="sprout-tests"></script>
  </body> 
</html>
